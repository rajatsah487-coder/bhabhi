<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Happy Birthday Shikha</title>

<style>

body{
margin:0;
font-family: 'Segoe UI', sans-serif;
background:linear-gradient(135deg,#ff9a9e,#fad0c4);
overflow:hidden;
text-align:center;
color:white;
}

.container{
position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-50%);
}

button{
padding:15px 40px;
font-size:20px;
border:none;
border-radius:40px;
background:white;
color:#ff4b6e;
cursor:pointer;
box-shadow:0 0 20px rgba(0,0,0,0.3);
transition:0.3s;
}

button:hover{
transform:scale(1.1);
}

.message{
display:none;
font-size:40px;
animation:fade 2s forwards;
}

@keyframes fade{
from{opacity:0; transform:translateY(20px)}
to{opacity:1; transform:translateY(0)}
}

.hearts{
position:absolute;
width:100%;
height:100%;
top:0;
left:0;
pointer-events:none;
}

.heart{
position:absolute;
color:red;
font-size:20px;
animation:float 6s linear infinite;
}

@keyframes float{
0%{transform:translateY(100vh); opacity:1}
100%{transform:translateY(-10vh); opacity:0}
}

.fireworks{
display:none;
font-size:60px;
animation:boom 1s infinite alternate;
}

@keyframes boom{
from{transform:scale(1)}
to{transform:scale(1.3)}
}

</style>
</head>

<body>

<div class="container">

<button id="startBtn">Start the Surprise</button>

<h1 class="message" id="msg1">Hello Shikha Bhabhi 🎉</h1>

<h1 class="message" id="msg2">Today is a very special day ✨</h1>

<h1 class="message" id="msg3">Because the world was blessed with YOU 💖</h1>

<h1 class="message" id="msg4">Happy Birthday Shikha 🎂</h1>

<h2 class="message" id="msg5">
May your life be full of happiness, laughter, love and beautiful moments.  
You are an amazing person and today is all about celebrating YOU.
</h2>

<div class="fireworks" id="fireworks">🎆 🎇 🎆 🎇</div>

</div>

<div class="hearts" id="hearts"></div>

<script>

let step=0;

document.getElementById("startBtn").onclick=function(){

this.style.display="none";

nextStep();

}

function nextStep(){

step++;

let msg=document.getElementById("msg"+step);

if(msg){
msg.style.display="block";
setTimeout(nextStep,3000);
}

if(step==3){
createHearts();
}

if(step==5){
document.getElementById("fireworks").style.display="block";
}

}

function createHearts(){

let container=document.getElementById("hearts");

setInterval(()=>{

let heart=document.createElement("div");
heart.className="heart";
heart.innerHTML="❤";

heart.style.left=Math.random()*100+"%";
heart.style.fontSize=(Math.random()*20+20)+"px";

container.appendChild(heart);

setTimeout(()=>{
heart.remove();
},6000);

},300);

}

</script>

</body>
</html>
