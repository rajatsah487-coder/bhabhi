<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Shikha's Birthday</title>

<style>

body{
margin:0;
background:black;
font-family:Arial;
overflow:hidden;
color:white;
text-align:center;
}

#startScreen{
position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-50%);
}

button{
padding:18px 40px;
font-size:22px;
border:none;
border-radius:50px;
background:linear-gradient(45deg,#ff0080,#ff8c00);
color:white;
cursor:pointer;
box-shadow:0 0 25px #ff0080;
}

button:hover{
transform:scale(1.1);
}

.message{
position:absolute;
width:100%;
top:40%;
font-size:45px;
opacity:0;
transition:2s;
}

.show{
opacity:1;
}

#cake{
font-size:120px;
position:absolute;
bottom:20%;
left:50%;
transform:translateX(-50%);
opacity:0;
transition:2s;
}

.balloon{
position:absolute;
font-size:35px;
animation:float 8s linear infinite;
}

@keyframes float{
0%{transform:translateY(100vh)}
100%{transform:translateY(-120vh)}
}

.star{
position:absolute;
width:2px;
height:2px;
background:white;
}

.firework{
position:absolute;
font-size:40px;
animation:explode 1.5s ease-out forwards;
}

@keyframes explode{
0%{transform:scale(0)}
100%{transform:scale(3);opacity:0}
}

</style>
</head>

<body>

<div id="startScreen">
<h1>✨ A Special Surprise ✨</h1>
<button onclick="start()">Begin Shikha's Birthday</button>
</div>

<div class="message" id="m1">Hello Shikha 🎉</div>
<div class="message" id="m2">Tonight the stars celebrate you</div>
<div class="message" id="m3">Because someone very special was born</div>
<div class="message" id="m4">Happy Birthday Shikha 🎂</div>

<div id="cake">🎂</div>

<div class="message" id="final">
May your life be filled with happiness, love and endless smiles.<br>
You make the world brighter just by being in it.<br><br>
Have a beautiful birthday Shikha 💖
</div>

<script>

function createStars(){
for(let i=0;i<150;i++){
let s=document.createElement("div")
s.className="star"
s.style.left=Math.random()*100+"%"
s.style.top=Math.random()*100+"%"
document.body.appendChild(s)
}
}

function balloons(){
setInterval(()=>{
let b=document.createElement("div")
b.className="balloon"
b.innerHTML="🎈"
b.style.left=Math.random()*100+"%"
document.body.appendChild(b)
setTimeout(()=>b.remove(),8000)
},500)
}

function fireworks(){
setInterval(()=>{
let f=document.createElement("div")
f.className="firework"
f.innerHTML="✨"
f.style.left=Math.random()*100+"%"
f.style.top=Math.random()*80+"%"
document.body.appendChild(f)
setTimeout(()=>f.remove(),1500)
},700)
}

function show(id,time){
setTimeout(()=>{
document.getElementById(id).classList.add("show")
},time)
}

function start(){

document.getElementById("startScreen").style.display="none"

createStars()
balloons()

show("m1",1000)
show("m2",4000)
show("m3",7000)
show("m4",10000)

setTimeout(()=>{
document.getElementById("cake").style.opacity="1"
},12000)

setTimeout(()=>{
fireworks()
document.getElementById("final").classList.add("show")
},15000)

}

</script>

</body>
</html>
